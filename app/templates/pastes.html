{% extends 'layout.html' %}
{% block content %}
<h2 class="title">My Pastes</h2>
<table class="table is-fullwidth">
<tr><th>ID</th><th>Preview</th><th>Actions</th></tr>
{% for p in pastes %}
<tr>
  <td><a href="{{ url_for('view_paste', paste_id=p.id) }}">{{ p.id }}</a></td>
  <td>{{ p.content[:30] }}{% if p.content|length > 30 %}...{% endif %}</td>
  <td>
    {% if current_user.is_authenticated %}
      <a class="button is-small is-danger" href="{{ url_for('delete_paste', paste_id=p.id) }}">Delete</a>
    {% endif %}
  </td>
</tr>
{% endfor %}
</table>
{% endblock %}
